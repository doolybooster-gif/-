{% extends 'base.html' %}

{% block content %}
<div class="card">
  <div class="badge">{{ branch.name }} / {{ branch.code }}</div>
  <h2 style="margin-bottom:6px;">모바일 번호판 점검</h2>
  <p class="muted">오늘 운행 가능 차량 홀짝: <strong>{{ allowed_parity }}</strong></p>

  <form id="scanForm" enctype="multipart/form-data">
    <input type="hidden" name="branch_code" value="{{ branch.code }}">

    <div class="row">
      <div>
        <label>점검자명</label>
        <input type="text" name="inspector_name" placeholder="예: 양대리">
      </div>

      <div>
        <label>차량번호 수동보정</label>
        <input type="text" name="manual_plate" placeholder="차량번호 전체 또는 끝 4자리 입력">
        <input type="hidden" name="selected_plate" id="selected_plate">
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>번호판 사진</label>
      <input type="file" name="image" accept="image/*" capture="environment">
    </div>

    <div style="margin-top:14px;">
      <button type="submit">촬영 후 판정하기</button>
    </div>
  </form>
</div>

<div class="card" id="resultCard" style="display:none;">
  <h3>판정 결과</h3>
  <div id="resultText"></div>
  <div id="resultMeta" class="muted" style="margin-top:8px;"></div>
  <div id="candidateArea" style="margin-top:12px;"></div>

  <div id="violationActions" style="display:none;margin-top:14px;">
    <form id="violationForm">
      <input type="hidden" name="scan_id" id="scan_id">
      <button type="submit">위반차량으로 등록</button>
      <button type="button" class="button secondary" onclick="hideViolation()">등록 안 함</button>
    </form>
  </div>
</div>

<script>
const scanForm = document.getElementById('scanForm');
const resultCard = document.getElementById('resultCard');
const resultText = document.getElementById('resultText');
const resultMeta = document.getElementById('resultMeta');
const candidateArea = document.getElementById('candidateArea');
const violationActions = document.getElementById('violationActions');
const violationForm = document.getElementById('violationForm');
const scanIdInput = document.getElementById('scan_id');

scanForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(scanForm);

  try {
    const res = await fetch('/api/scan', {
      method: 'POST',
      body: formData
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`판정 요청 실패: ${res.status} ${text}`);
    }

    const data = await res.json();

    resultCard.style.display = 'block';
    candidateArea.innerHTML = '';

    if (data.needs_selection) {
      resultText.innerHTML = `<strong>${data.message}</strong>`;
      resultMeta.innerHTML = '후보 차량번호를 선택한 뒤 다시 판정하기를 눌러주세요.';
      violationActions.style.display = 'none';

      candidateArea.innerHTML = data.candidates
        .map(p => `<button type="button" class="button secondary" style="margin-right:8px; margin-bottom:8px;" onclick="selectPlate('${p}')">${p}</button>`)
        .join('');

      return;
    }

    resultText.innerHTML = `<strong>${data.message}</strong>`;
    resultMeta.innerHTML =
      `OCR: ${data.ocr_plate || '-'} / 확정 차량번호: ${data.confirmed_plate || '-'} / 등록차량여부: ${data.vehicle_found ? 'Y' : 'N'}`;

    if (data.is_violation) {
      violationActions.style.display = 'block';
      scanIdInput.value = data.scan_id;
    } else {
      violationActions.style.display = 'none';
    }
  } catch (err) {
    resultCard.style.display = 'block';
    resultText.innerHTML = `<strong>오류가 발생했습니다.</strong>`;
    resultMeta.textContent = err.message || String(err);
    candidateArea.innerHTML = '';
    violationActions.style.display = 'none';
  }
});

violationForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData();
  formData.append('register', 'true');

  const scanId = scanIdInput.value;

  try {
    const res = await fetch(`/api/scan/${scanId}/register_violation`, {
      method: 'POST',
      body: formData
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`위반 등록 실패: ${res.status} ${text}`);
    }

    const data = await res.json();

    if (data.ok) {
      resultText.innerHTML += '<div style="margin-top:8px;" class="badge danger">위반차량으로 등록 완료</div>';
      violationActions.style.display = 'none';
    }
  } catch (err) {
    resultText.innerHTML += `<div style="margin-top:8px;" class="badge danger">오류: ${err.message || String(err)}</div>`;
  }
});

function selectPlate(plate) {
  const manualInput = document.querySelector('input[name="manual_plate"]');
  const hiddenInput = document.getElementById('selected_plate');

  manualInput.value = plate;
  hiddenInput.value = plate;

  resultText.innerHTML = `<strong>${plate} 차량번호가 선택되었습니다.</strong>`;
  resultMeta.innerHTML = `이제 다시 '촬영 후 판정하기'를 누르면 해당 차량으로 최종 판정합니다.`;
  candidateArea.innerHTML = '';
  violationActions.style.display = 'none';
}

function hideViolation() {
  violationActions.style.display = 'none';
}
</script>
{% endblock %}
